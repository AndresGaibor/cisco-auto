# .github/workflows/pt-runtime-ci.yml
# CI Pipeline para pt-runtime y types

name: PT Runtime CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/pt-runtime/**'
      - 'packages/types/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/pt-runtime/**'
      - 'packages/types/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck packages/types
        run: cd packages/types && bun run typecheck || true

      - name: Typecheck packages/pt-runtime
        run: |
          cd packages/pt-runtime
          bun run typecheck 2>&1 || true
        continue-on-error: true

      - name: Build pt-runtime
        run: |
          cd packages/pt-runtime
          bun run build:runtime 2>&1 || true
        continue-on-error: true

      - name: Validate PT-safe output
        run: |
          cd packages/pt-runtime
          bun --eval "
            import { renderRuntimeV2Sync } from './src/build/render-runtime-v2.ts';
            import { validatePtSafe } from './src/build/validate-pt-safe.ts';
            
            const runtime = renderRuntimeV2Sync({
              srcDir: './src',
              outputPath: '',
              injectDevDir: '~/pt-dev'
            });
            
            const validation = validatePtSafe(runtime);
            if (!validation.valid) {
              console.error('PT-safe validation FAILED');
              for (const err of validation.errors.slice(0, 5)) {
                console.error('  Line', err.line + ':', err.message);
              }
              process.exit(1);
            }
            console.log('PT-safe validation PASSED');
            console.log('Runtime size:', runtime.length, 'chars');
          "
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Check formatting
        run: |
          cd packages/pt-runtime
          bun run lint 2>&1 || true
        continue-on-error: true

  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate runtime
        run: |
          cd packages/pt-runtime
          bun --eval "
            import { renderRuntimeV2Sync } from './src/build/render-runtime-v2.ts';
            import { renderMainV2 } from './src/build/render-main-v2.ts';
            
            const runtime = renderRuntimeV2Sync({
              srcDir: './src',
              outputPath: '',
              injectDevDir: '~/pt-dev'
            });
            
            const main = renderMainV2({
              srcDir: './src',
              outputPath: '',
              injectDevDir: '~/pt-dev'
            });
            
            console.log('Generated artifacts:');
            console.log('  runtime.js:', runtime.length, 'chars');
            console.log('  main.js:', main.length, 'chars');
          "
