name: IP Duplicate - 2 PCs con la misma IP
description: Laboratorio para detectar conflictos de IP duplicada

devices:
  - name: Switch1
    type: switch
    model: 2960
    x: 300
    y: 200

  - name: PC1
    type: pc
    model: PC
    x: 150
    y: 350

  - name: PC2
    type: pc
    model: PC
    x: 450
    y: 350

links:
  - from: PC1
    fromPort: Fa0
    to: Switch1
    toPort: Fa0/1

  - from: PC2
    fromPort: Fa0
    to: Switch1
    toPort: Fa0/2

configs:
  - device: PC1
    type: host
    ip: 192.168.10.10
    mask: 255.255.255.0

  - device: PC2
    type: host
    ip: 192.168.10.10
    mask: 255.255.255.0

validation:
  - type: ip_conflict
    device: PC2
    expect:
      conflict_detected: true
      ip: 192.168.10.10
