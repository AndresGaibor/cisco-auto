name: vlan-simple
devices:
  - name: SW1
    model: 2960-24TT
    role: access

vlans:
  - id: 100
    name: GUESTS
    subnet: 10.0.100.0/24
    gateway: 10.0.100.1

switching:
  accessPorts:
    - device: SW1
      interface: FastEthernet0/1
      vlan: 100

verification:
  connectivity:
    - from: PC-GUESTS-1
      to: 10.0.100.1
      type: ping
